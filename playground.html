merge := func(left, right) {
    result := []
    li := 0
    ri := 0
    for li &lt; len(left) &amp;&amp; ri &lt; len(right) {
        if left[li] &lt;= right[ri] {
            result = append(result, left[li])
            li&#43;&#43;
        } else {
            result = append(result, right[ri])
            ri&#43;&#43;
        }
    }
    for li &lt; len(left) {
        result = append(result, left[li])
        li&#43;&#43;
    }
    for ri &lt; len(right) {
        result = append(result, right[ri])
        ri&#43;&#43;
    }
    return result
}

msort := func(arr) {
    if len(arr) &lt;= 1 { return arr }
    mid := len(arr) / 2
    return merge(msort(arr[:mid]), msort(arr[mid:]))
}

            <option value="higher-order-functions" data-code="fmt := import(&#34;fmt&#34;)

            <option value="coroutine-pipelines" data-code="fmt := import(&#34;fmt&#34;)
coro := import(&#34;coro&#34;)

numbers := func(n) {
    return coro.new(func(yield) {
        for i := 1; i &lt;= n; i&#43;&#43; {
            yield(i)
        }
    })
}

filter_c := func(src, pred) {
    return coro.new(func(yield) {
        for _, v in src {
            if pred(v) { yield(v) }
        }
    })
}

map_c := func(src, f) {
    return coro.new(func(yield) {
        for _, v in src { yield(f(v)) }
    })
}

take := func(src, n) {
    result := []
    for _, v in src {
        result = append(result, v)
        if len(result) &gt;= n { break }
    }
    return result
}

pipeline := map_c(
    filter_c(numbers(10), func(x) { return x % 2 == 0 }),
    func(x) { return x * x }
)

for _, v in pipeline {
    fmt.println(v)
}

naturals := coro.new(func(yield) {
    i := 1
    for { yield(i); i&#43;&#43; }
})

            <option value="game-scripting" data-code="fmt := import(&#34;fmt&#34;)

player := {health: 45, position: {x: 20, y: 15}, weapon: &#34;sword&#34;}
npc    := {
    name:         &#34;Guard&#34;,
    health:       80,
    position:     {x: 10, y: 10},
    state:        &#34;idle&#34;,
    alert_range:  8,
    attack_range: 2,
}

within := func(a, b, r) {
    dx := a.x - b.x
    dy := a.y - b.y
    return dx*dx &#43; dy*dy &lt;= r*r
}

tick := func(npc, player) {
    if npc.state == &#34;idle&#34; {
        if within(player.position, npc.position, npc.alert_range) {
            npc.state = &#34;alerted&#34;
            return {action: &#34;say&#34;, text: &#34;Halt! Who goes there?&#34;}
        }
        return {action: &#34;patrol&#34;}
    }

    if npc.state == &#34;alerted&#34; {
        if within(player.position, npc.position, npc.attack_range) {
            npc.state = &#34;fighting&#34;
        } else {
            return {action: &#34;move_towards&#34;, target: player.position}
        }
    }

    if npc.state == &#34;fighting&#34; {
        if npc.health &lt; 20 {
            npc.state = &#34;fleeing&#34;
            return {action: &#34;say&#34;, text: &#34;Mercy!&#34;}
        }
        dmg := 12
        if player.weapon != &#34;&#34; { dmg = 8 }
        return {action: &#34;attack&#34;, damage: dmg}
    }

    if npc.state == &#34;fleeing&#34; {
        return {action: &#34;run&#34;}
    }

    return {action: &#34;idle&#34;}
}

print_tick := func(npc, result) {
    fmt.printf(&#34;%-10s → %s&#34;, npc.state, result[&#34;action&#34;])
    if !is_undefined(result[&#34;text&#34;]) {
        fmt.printf(&#34;: %q&#34;, result[&#34;text&#34;])
    }
    if !is_undefined(result[&#34;target&#34;]) {
        t := result[&#34;target&#34;]
        fmt.printf(&#34; (%d,%d)&#34;, t.x, t.y)
    }
    if !is_undefined(result[&#34;damage&#34;]) {
        fmt.printf(&#34; (dmg %d)&#34;, result[&#34;damage&#34;])
    }
    fmt.println(&#34;&#34;)
}

positions := [
    {x: 20, y: 15},  // out of range  → patrol
    {x: 14, y: 12},  // alert range   → alerted, say
    {x: 12, y: 11},  // closing in    → move_towards
    {x: 10, y: 10},  // attack range  → fighting, attack
]

for _, pos in positions {
    player.position = pos
    result := tick(npc, player)
    print_tick(npc, result)
}

fmt.println(&#34;--- NPC takes heavy damage ---&#34;)
npc.health = 15
result := tick(npc, player)
print_tick(npc, result)">Game Scripting</option>

        message: &#34;must be a float between 0.0 and 1.0&#34;,

health   := 100
coins    := 0

_ready := func() {
    fmt.printf(&#34;_ready   pos=(%.0f,%.0f) hp=%d\n&#34;,
        position.x, position.y, health)
}

_process := func(delta) {
    position.x &#43;= speed * delta
    fmt.printf(&#34;_process pos=(%.1f, %.1f)\n&#34;, position.x, position.y)
}

_on_coin_picked_up := func() {
    coins &#43;= 1
    fmt.printf(&#34;coin!    total=%d\n&#34;, coins)
}

_on_hit := func(damage) {
    health -= damage
    fmt.printf(&#34;hit!     hp=%d%s\n&#34;, health, health &lt;= 0 ? &#34; [dead]&#34; : &#34;&#34;)
}

_ready()
_process(0.016)
_process(0.016)
_process(0.016)
_on_coin_picked_up()
_on_hit(35)
